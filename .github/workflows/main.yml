name: Build and release plugin zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "ZIP_NAME=${GITHUB_REPOSITORY##*/}-${GITHUB_REF_NAME}.zip" >> $GITHUB_ENV

      - name: Build zip
        run: |
          mkdir -p build/${REPO_NAME}

          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".gitignore" \
            --exclude="build" \
            --exclude="*.zip" \
            ./ build/${REPO_NAME}/

          cd build
          zip -r ../${ZIP_NAME} ${REPO_NAME}
          cd ..

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release exists. Uploading new asset..."

            gh release upload "${VERSION}" \
              "${ZIP_NAME}" \
              --clobber
          else
            echo "Creating new release..."

            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --notes "Automatic release for ${VERSION}" \
              "${ZIP_NAME}"
          fi